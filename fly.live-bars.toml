# Fly.io config for the Databento live-bar aggregator. Pairs with
# Dockerfile.live-bars. This is a worker process — no HTTP service,
# just a long-lived Python loop that holds a WebSocket to Databento
# and writes 1-min bars to Upstash Redis.
#
# Deploy from repo root:
#   fly launch --config fly.live-bars.toml --dockerfile Dockerfile.live-bars --no-deploy --copy-config --yes
#   fly secrets set --config fly.live-bars.toml \
#     DATABENTO_API_KEY=db-xxxxx \
#     LIVE_DATASET=EQUS.MINI \
#     LIVE_SCHEMA=trades \
#     LIVE_SYMBOLS=SPY,QQQ,NVDA,TSLA,META,GOOGL,AAPL,MSFT,AMZN \
#     UPSTASH_REDIS_REST_URL=https://teaching-boa-121408.upstash.io \
#     UPSTASH_REDIS_REST_TOKEN=<rotated value>
#   fly deploy --config fly.live-bars.toml
#
# Status / logs:
#   fly status --config fly.live-bars.toml
#   fly logs --config fly.live-bars.toml

app = "aiedge-live-bars"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.live-bars"

# Single always-on worker. Fly's default behavior for non-HTTP apps is
# to keep the machine running; on crash the Docker CMD exits non-zero
# and Fly respawns it.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[deploy]
  strategy = "immediate"

# Health endpoint served by the aggregator on :8080. Fly polls /health
# every 30s and marks the machine unhealthy after two failures, which
# triggers a restart (and surfaces in `fly status` + dashboard alerts).
# Configure email/Slack notifications via the Fly dashboard.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"
