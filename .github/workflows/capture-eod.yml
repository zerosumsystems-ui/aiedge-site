name: Capture EOD Scan Snapshot

# Captures the final scanner output of each trading day and POSTs it to
# /api/scan/history so /history on aiedge.trade is populated. Then
# extends public/analogs/corpus.json from the new snapshot so the analog
# matcher (History → Analogs tab + scanner cards) gets one more day of
# real-world examples per weekday with no manual curation.
#
# Why 21:30 UTC Mon–Fri:
#   EDT (Mar–Nov): 5:30 PM ET — 90 min after US equity close (4:00 PM ET)
#   EST (Nov–Mar): 4:30 PM ET — 30 min after US equity close
#   Either way, we run after the scanner's last RTH post.
#
# On market holidays the scanner produces no fresh results and
# scripts/capture_eod.py exits 0 without POSTing.

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

# Never run two captures concurrently — the API would accept both but the
# second overwrites the first, wasting compute and confusing logs.
concurrency:
  group: capture-eod
  cancel-in-progress: false

# Need write to commit the extended corpus.json back to main.
permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Capture EOD snapshot
        env:
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: python3 scripts/capture_eod.py https://www.aiedge.trade

      # Each captured day adds one analog entry per ticker that finished
      # a full RTH session. Idempotent — re-runs are no-ops if no new
      # snapshot landed in ~/aiedge-history.
      - name: Extend analog corpus from new capture
        run: python3 scripts/extend_corpus_from_history.py

      - name: Commit corpus update if changed
        run: |
          if [[ -n "$(git status --porcelain public/analogs/corpus.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/analogs/corpus.json
            git commit -m "chore(corpus): auto-extend from EOD capture $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
            echo "corpus updated and pushed"
          else
            echo "no corpus changes (re-run with same snapshot, or capture skipped)"
          fi
